name: Test extraction methods v3
on:
  push:
    branches:
      - testing-extraction-methods

jobs:
  # Test using the actual cache-dance action with a real build
  real-workflow:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64, linux/ppc64le, linux/s390x, linux/386, linux/arm/v7]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: testing-extraction-methods

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
        id: buildx

      - uses: actions/cache@v4
        id: cache
        with:
          path: test-apt-cache
          key: test-apt-${{ matrix.platform }}-${{ github.run_id }}

      # Use the action from this repo at the v3.3.1-style commit (before your revert)
      # We'll test with the current code but modify extract-cache.ts
      # Actually let's just manually do what the action does

      - name: Prepare
        run: |
          mkdir -p scratch test-apt-cache
          date > scratch/buildstamp

      - name: Inject cache
        run: |
          cat > scratch/Dancefile.inject << 'DEOF'
          FROM ghcr.io/containerd/busybox:latest
          COPY buildstamp buildstamp
          RUN --mount=type=cache,target=/var/cache/apt \
              --mount=type=bind,source=.,target=/var/dance-cache \
              cp -p -R /var/dance-cache/. /var/cache/apt || true
          DEOF

          docker buildx build \
            --builder ${{ steps.buildx.outputs.name }} \
            --platform ${{ matrix.platform }} \
            -f scratch/Dancefile.inject \
            --tag dance:inject \
            --progress=plain \
            scratch

      - name: Real build (installs packages, populates cache)
        run: |
          cat > scratch/Dockerfile.build << 'DEOF'
          FROM debian:bookworm-slim
          RUN --mount=type=cache,target=/var/cache/apt,sharing=locked \
              --mount=type=cache,target=/var/lib/apt,sharing=locked \
              rm -f /etc/apt/apt.conf.d/docker-clean && \
              echo 'Binary::apt::APT::Keep-Downloaded-Packages "true";' > /etc/apt/apt.conf.d/keep-cache && \
              apt-get update && \
              apt-get install -y --no-install-recommends \
                curl wget git ca-certificates \
                build-essential gcc g++ make \
                python3 python3-pip python3-dev && \
              echo "installed"
          DEOF

          docker buildx build \
            --builder ${{ steps.buildx.outputs.name }} \
            --platform ${{ matrix.platform }} \
            -f scratch/Dockerfile.build \
            --tag testbuild:latest \
            --progress=plain \
            scratch

      # Now test the v3.3.1 extraction method (the one that hangs)
      - name: "Extract cache (v3.3.1 method: FROM scratch + COPY --chmod + output type=local)"
        run: |
          cat > scratch/Dancefile.extract << 'DEOF'
          FROM ghcr.io/containerd/busybox:latest AS dance-extract
          COPY buildstamp buildstamp
          RUN --mount=type=cache,target=/var/cache/apt \
              mkdir -p /var/dance-cache/ \
              && cp -p -R /var/cache/apt/. /var/dance-cache/ || true
          FROM scratch
          COPY --from=dance-extract --chmod=u=rwX,go=rX /var/dance-cache /
          DEOF

          echo "=== Starting extraction (this is where the hang would occur) ==="
          docker buildx build \
            --builder ${{ steps.buildx.outputs.name }} \
            --platform ${{ matrix.platform }} \
            -f scratch/Dancefile.extract \
            --tag dance:extract \
            --output type=local,dest=test-apt-cache \
            --progress=plain \
            scratch
          echo "=== Extraction completed ==="

      - name: Verify
        run: |
          echo "=== Cache size ==="
          du -sh test-apt-cache/ 2>/dev/null || echo "EMPTY"
          echo "=== File count ==="
          find test-apt-cache/ -type f 2>/dev/null | wc -l
