name: Test with actual action
on:
  push:
    branches:
      - testing-extraction-methods

jobs:
  test-v331-action:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Mirror exact pwndbg setup: ARM host for most, AMD for amd64/armv7
          - platform: linux/amd64
            runner: ubuntu-latest
            tag: amd64
          - platform: linux/arm/v7
            runner: ubuntu-latest
            tag: armv7l
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            tag: arm64
          - platform: linux/386
            runner: ubuntu-24.04-arm
            tag: 386
          - platform: linux/ppc64le
            runner: ubuntu-24.04-arm
            tag: ppc64le
          - platform: linux/s390x
            runner: ubuntu-24.04-arm
            tag: s390x

    runs-on: ${{ matrix.runner }}
    name: "v331-action ${{ matrix.tag }} (${{ matrix.runner }})"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: testing-extraction-methods

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
        id: buildx

      - uses: actions/cache@v4
        id: cache
        with:
          path: |
            test-apt-${{ matrix.tag }}
          key: test-action-v331-${{ matrix.tag }}-${{ github.run_id }}

      # Use the ACTUAL v3.3.1 action
      - name: Inject/extract cache (v3.3.1 action)
        uses: reproducible-containers/buildkit-cache-dance@v3.3.1
        with:
          cache-map: |
            {
              "test-apt-${{ matrix.tag }}": "/var/cache/apt"
            }
          builder: ${{ steps.buildx.outputs.name }}
          skip-extraction: false

      - name: Build
        run: |
          cat > /tmp/Dockerfile.test << 'DEOF'
          FROM debian:bookworm-slim
          RUN --mount=type=cache,target=/var/cache/apt,sharing=locked \
              --mount=type=cache,target=/var/lib/apt,sharing=locked \
              rm -f /etc/apt/apt.conf.d/docker-clean && \
              echo 'Binary::apt::APT::Keep-Downloaded-Packages "true";' > /etc/apt/apt.conf.d/keep-cache && \
              apt-get update && \
              apt-get install -y --no-install-recommends \
                locales vim git python3 python3-dev python3-venv \
                patch libncurses-dev libssl-dev libffi-dev pkg-config \
                cmake build-essential curl make gcc musl-tools \
                libc6-dev && \
              echo "done"
          DEOF

          docker buildx build \
            --builder ${{ steps.buildx.outputs.name }} \
            --platform ${{ matrix.platform }} \
            --progress=plain \
            -f /tmp/Dockerfile.test \
            .

      # Post-job from v3.3.1 action will run automatically here
      # This is where the hang should occur
